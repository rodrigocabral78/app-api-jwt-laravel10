---
version: "3.8"

volumes:
  logs:
    # driver: local
  sessions:

services:
  app:
    # build:
    #   context: ./dockerfiles/8.1.18
    #   dockerfile: Dockerfile.debian
    #   tags:
    #     - rodrigocabral78/app-php:8.1.18-alpine
    #     - rodrigocabral78/app-php:latest
    #   args:
    #     GROUP: ${GROUP:-1001}:1001
    image: php:8.1-alpine
    command: php -S 0.0.0.0:8000 -t public
    # command: ./artisan serve -vvv --ansi --host=localhost --port=8000

    # env_file: .env-file
    environment:
      docker: "true"

    ports:
      - 8080:8000
    extra_hosts:
      - host.docker.internal:host-gateway
    network_mode: bridge
    # networks:
    #   - dba_network

    working_dir: /var/www
    volumes:
      - .:/var/www
      - logs:/var/www/storage/logs
      - sessions:/var/www/storage/framework/sessions

    # restart: always
    privileged: true
    tty: true
    stdin_open: true
    # user: 0:998

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.role == manager]
      # update_config:
      #   parallelism: 2
      #   delay: 10s
      #   order: stop-first
      # restart_policy:
      #   condition: on-failure
      #   delay: 5s
      #   max_attempts: 3
      #   window: 120s
      resources:
        limits:
          cpus: '1'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 256M
